<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelite - Model Login & Registration</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth-styles.css">
    <link rel="stylesheet" href="enhanced.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">MODELITE</div>
            <ul class="nav-links">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="index.html#portfolio">Portfolio</a></li>
                <li><a href="index.html#services">Services</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Auth Container -->
    <div class="auth-container">
        <div class="auth-box">
            <h1>Modelite</h1>
            <p>Build Your Modeling Career</p>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <h2>Login to Your Profile</h2>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="cta-button">Login</button>
                <p class="auth-switch">
                    Don't have an account? <a href="#" onclick="switchForm(event)">Create one</a>
                </p>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form">
                <h2>Create Your Profile</h2>
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="registerName" placeholder="Your Full Name" required>
                </div>
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" id="registerEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="registerPassword" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" class="cta-button">Create Account</button>
                <p class="auth-switch">
                    Already have an account? <a href="#" onclick="switchForm(event)">Login here</a>
                </p>
            </form>
        </div>
    </div>

    <script src="components.js"></script>
    <script src="auth-script.js"></script>
</body>
</html>
